name: Instagram Sync

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Instagram scraper
        run: python scraper/scrape.py

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Instagram Sync Bot"
          git add data/posts.json data/images/
          git commit -m "chore: sync Instagram posts [skip ci]"
          git push

      - name: Summary
        run: |
          echo "✅ Instagram sync completed"
          if [ "${{ steps.verify-changed-files.outputs.changed }}" == "true" ]; then
            echo "📝 Updated posts.json and images"
          else
            echo "ℹ️ No changes to commit"
          fi
