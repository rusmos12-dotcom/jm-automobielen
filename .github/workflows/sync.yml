name: Instagram Sync

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Instagram scraper
        run: |
          python scraper/scrape.py
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet data/posts.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Instagram Sync Bot"
          git add data/posts.json
          git commit -m "chore: sync Instagram posts [skip ci]"
          git push

      - name: Summary
        run: |
          echo "✅ Instagram sync completed"
          if [ "${{ steps.verify-changed-files.outputs.changed }}" == "true" ]; then
            echo "📝 Updated posts.json"
          else
            echo "ℹ️ No changes to commit"
          fi
